<!DOCTYPE html>
<html>
<head>
  <title>Listado</title>
</head>
<body>

<h1>Listado de Agentes</h1>

<button onclick="listar()">Cargar datos</button>

<table border="1" id="tabla">
  <thead>
    <tr>
      <th>Código</th>
      <th>Nombre</th>
      <th>Ruta</th>
    </tr>
  </thead>
  <tbody id="tbody">
  </tbody>
</table>

<br>
<button onclick="location.href='index.html'">Regresar</button>

<script>
async function listar() {
  try {
    const res = await fetch('/api/listar');
    const data = await res.json();

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
      const fila = document.createElement("tr");

      fila.innerHTML = `
        <td>${item.AG_CODAGE}</td>
        <td>${item.AG_NOMAGE}</td>
        <td>${item.AG_RUTA}</td>
      `;

      tbody.appendChild(fila);
    });

  } catch (error) {
    console.error(error);
    alert("Error al cargar datos");
  }
}
</script>
</body>
</html>
