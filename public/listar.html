<!DOCTYPE html>
<html>
<head>
  <title>Listado</title>
</head>
<body>

<h1>Listado de Agentes</h1>

<button onclick="listar()">Cargar datos</button>

<ul id="lista"></ul>

<br>
<button onclick="location.href='index.html'">Regresar</button>

<script>
async function listar() {
  const res = await fetch('/api/listar');
  const data = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(item => {
    const li = document.createElement("li");
    li.textContent = item.AG_CODAGE + " - " + item.AG_NOMAGE + " - " + item.AG_RUTA;
    lista.appendChild(li);
  });
}
</script>

</body>
</html>
